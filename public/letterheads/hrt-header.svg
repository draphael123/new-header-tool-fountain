<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 127" width="612" height="127">
  <!-- Background -->
  <rect width="612" height="127" fill="white"/>

  <!-- Decorative corner graphic -->
  <defs>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E8C;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FF6B35;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <ellipse cx="580" cy="30" rx="100" ry="80" fill="url(#pinkGrad)" opacity="0.5"/>
  <ellipse cx="540" cy="50" rx="60" ry="50" fill="#E91E8C" opacity="0.2"/>

  <!-- Logo area -->
  <g transform="translate(40, 20)">
    <!-- Fountain leaf/drop icon -->
    <path d="M0 45 Q15 0 30 25 Q45 50 30 70 Q15 90 0 70 Q-15 50 0 25 Z"
          fill="#0A1628" transform="scale(0.5)"/>
    <path d="M20 35 Q30 10 40 30 Q50 50 40 65 Q30 80 20 65 Q10 50 20 30 Z"
          fill="#E91E8C" transform="scale(0.5)"/>
    <!-- Fountain text -->
    <text x="40" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="500" fill="#0A1628">Fountain</text>
  </g>

  <!-- Pink accent bar -->
  <defs>
    <linearGradient id="pinkBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E91E8C"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
  </defs>
  <rect x="0" y="75" width="300" height="8" fill="url(#pinkBar)"/>
</svg>
