<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 95" width="612" height="95">
  <!-- Background -->
  <rect width="612" height="95" fill="white"/>

  <!-- Fountain Logo - Stylized leaf/water drops -->
  <g transform="translate(45, 12)">
    <!-- Dark navy outer leaf -->
    <path d="M0 55 C0 25, 15 0, 15 0 C15 0, 30 25, 30 55 C30 75, 15 85, 15 85 C15 85, 0 75, 0 55 Z"
          fill="#0B1C39" transform="rotate(-15, 15, 42)"/>
    <!-- Teal middle leaf -->
    <path d="M18 50 C18 28, 30 8, 30 8 C30 8, 42 28, 42 50 C42 66, 30 74, 30 74 C30 74, 18 66, 18 50 Z"
          fill="#00B5B8" transform="rotate(-5, 30, 40)"/>
    <!-- Light teal small leaf -->
    <path d="M36 45 C36 30, 44 15, 44 15 C44 15, 52 30, 52 45 C52 56, 44 62, 44 62 C44 62, 36 56, 36 45 Z"
          fill="#5DD3D5" transform="rotate(5, 44, 38)"/>
  </g>

  <!-- Fountain Text -->
  <text x="115" y="58" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="400" fill="#0B1C39" letter-spacing="1">Fountain</text>

  <!-- Teal accent line -->
  <rect x="260" y="48" width="320" height="3" fill="#00B5B8"/>
</svg>