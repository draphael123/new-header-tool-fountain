<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 612 79" width="612" height="79">
  <!-- Background -->
  <rect width="612" height="79" fill="white"/>

  <!-- Teal accent line at top -->
  <rect x="0" y="0" width="612" height="2" fill="#00B5B8"/>

  <!-- Message section with globe icon -->
  <g transform="translate(50, 25)">
    <!-- Globe icon -->
    <circle cx="18" cy="18" r="16" fill="none" stroke="#333333" stroke-width="1.5"/>
    <ellipse cx="18" cy="18" rx="6" ry="16" fill="none" stroke="#333333" stroke-width="1.2"/>
    <line x1="2" y1="18" x2="34" y2="18" stroke="#333333" stroke-width="1.2"/>
    <line x1="18" y1="2" x2="18" y2="34" stroke="#333333" stroke-width="1.2"/>
    <path d="M5 10 Q18 8 31 10" fill="none" stroke="#333333" stroke-width="1"/>
    <path d="M5 26 Q18 28 31 26" fill="none" stroke="#333333" stroke-width="1"/>

    <!-- Message text -->
    <text x="45" y="14" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#333333">Message</text>
    <text x="45" y="30" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#555555">support@fountain.net</text>
  </g>

  <!-- Office Address section with location pin -->
  <g transform="translate(420, 25)">
    <!-- Location pin icon -->
    <path d="M18 2 C10 2 4 8 4 15 C4 24 18 36 18 36 C18 36 32 24 32 15 C32 8 26 2 18 2 Z"
          fill="none" stroke="#00B5B8" stroke-width="2"/>
    <circle cx="18" cy="14" r="5" fill="#00B5B8"/>

    <!-- Address text -->
    <text x="45" y="10" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#333333">Office Address</text>
    <text x="45" y="24" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555555">2064 Park Street,</text>
    <text x="45" y="37" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#555555">Jacksonville, FL 32204</text>
  </g>
</svg>